<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | School Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; }
    .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex w-20 h-20 rounded-2xl bg-indigo-600/20 text-indigo-500 items-center justify-center mb-4 text-3xl shadow-2xl">
        <i class="fa-solid fa-lock"></i>
      </div>
      <h1 class="text-3xl font-extrabold text-white">Admin Login</h1>
      <p class="text-slate-400 mt-2">Manage your school admissions portal</p>
    </div>

    <div class="glass-card rounded-3xl p-8 shadow-2xl">
      <div id="errorMsg" class="hidden bg-red-500/10 border border-red-500/50 text-red-400 rounded-xl px-4 py-3 mb-6 text-sm flex items-center gap-3">
        <i class="fa-solid fa-triangle-exclamation"></i> <span id="errorText"></span>
      </div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5" for="email">Email</label>
          <div class="relative">
            <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
            <input type="email" id="email" required
              class="w-full pl-11 pr-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition shadow-inner"
              placeholder="admin@example.com" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5" for="password">Password</label>
          <div class="relative">
            <i class="fa-solid fa-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
            <input type="password" id="password" required
              class="w-full pl-11 pr-4 py-3 rounded-xl bg-slate-900/50 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition shadow-inner"
              placeholder="••••••••" />
          </div>
        </div>

        <button type="submit" id="loginBtn"
          class="w-full py-4 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-base shadow-lg hover:shadow-indigo-500/20 transition-all transform hover:-translate-y-0.5">
          Sign In to Dashboard
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-slate-800 text-center">
        <a href="../index.html" class="text-slate-500 hover:text-indigo-400 text-sm transition font-medium">
          <i class="fa-solid fa-arrow-left mr-1"></i> Back to Admission Form
        </a>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://jqvgwrodaiflbypltjdy.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impxdmd3cm9kYWlmbGJ5cGx0amR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODU0NzgsImV4cCI6MjA4OTE2MTQ3OH0.1LuaunIGVMXP6Lp4D9Kw9ye0-Rgeo_SW_ZFKCr2PoUY';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.add('hidden');
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email: email,
          password: password,
        });

        if (error) {
          errorText.textContent = error.message;
          errorMsg.classList.remove('hidden');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Sign In to Dashboard';
        } else {
          // Success
          window.location.href = 'dashboard.html';
        }
      } catch (err) {
        errorText.textContent = 'An unexpected error occurred.';
        errorMsg.classList.remove('hidden');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In to Dashboard';
      }
    });

    // Check if already logged in
    async function checkSession() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        window.location.href = 'dashboard.html';
      }
    }
    checkSession();
  </script>
</body>
</html>
