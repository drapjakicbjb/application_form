<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Applications - Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #cbd5e1;
    }

    .admin-sidebar {
      background: #1e1b4b;
      color: white;
      width: 260px;
      height: 100vh;
      position: sticky;
      top: 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      color: #a5b4fc;
      transition: 0.2s;
      font-size: 14px;
      font-weight: 500;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.05);
      color: white;
    }

    .nav-item.active {
      background: #4f46e5;
      color: white;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .badge-pending {
      background: #fef3c7;
      color: #d97706;
    }

    .badge-accepted {
      background: #dcfce7;
      color: #16a34a;
    }

    .badge-rejected {
      background: #fee2e2;
      color: #dc2626;
    }
  </style>
</head>

<body class="hidden bg-slate-50 text-slate-900" id="bodyContent">

  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="admin-sidebar hidden md:flex flex-col py-6">
      <div class="flex items-center gap-3 px-6 mb-8">
        <div class="w-10 h-10 rounded-xl bg-white/15 flex items-center justify-center">
          <i class="fa-solid fa-graduation-cap text-white text-lg"></i>
        </div>
        <div>
          <p class="text-white font-bold text-sm leading-tight">School Admin</p>
          <p class="text-indigo-400 text-xs">Management Panel</p>
        </div>
      </div>
      <nav class="flex-1 space-y-0.5">
        <p class="text-indigo-500 text-xs font-bold uppercase tracking-widest px-7 mb-2">Main Menu</p>
        <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
        <a href="view_applications.html" class="nav-item active" id="nav_all"><i class="fa-solid fa-file-lines"></i>
          Applications</a>
        <a href="view_applications.html?status=Pending" class="nav-item" id="nav_pending"><i
            class="fa-solid fa-hourglass-half"></i> Pending</a>
        <a href="view_applications.html?status=Accepted" class="nav-item" id="nav_accepted"><i
            class="fa-solid fa-circle-check"></i> Accepted</a>
        <a href="view_applications.html?status=Rejected" class="nav-item" id="nav_rejected" style="color:#fca5a5"><i
            class="fa-solid fa-circle-xmark"></i> Rejected</a>
        <div class="my-4 border-t border-white/10 mx-5"></div>
        <a href="../index.html" target="_blank" class="nav-item"><i class="fa-solid fa-arrow-up-right-from-square"></i>
          Admission Form</a>
      </nav>
      <div class="px-5 mt-auto">
        <button onclick="handleLogout()"
          class="flex items-center gap-2 text-sm text-red-300 hover:text-red-100 font-medium px-2 py-2 transition w-full">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden">

      <!-- Applications List Sidebar -->
      <div class="w-80 border-r border-slate-200 bg-white flex flex-col flex-shrink-0">
        <div class="p-4 border-b border-slate-100 bg-slate-50/50">
          <h2 class="text-lg font-bold text-slate-800" id="list_title">Applications</h2>
          <p class="text-xs text-slate-500" id="list_count">Loading...</p>
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar" id="appList">
          <!-- List items injected here -->
        </div>
      </div>

      <!-- Application Details -->
      <div class="flex-1 overflow-y-auto bg-slate-50 custom-scrollbar" id="detailsArea">
        <div id="noSelection" class="h-full flex flex-col items-center justify-center p-12 text-slate-400">
          <div
            class="w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-sm mb-6 border border-slate-100">
            <i class="fa-solid fa-id-card-clip text-4xl opacity-20"></i>
          </div>
          <h2 class="text-xl font-bold text-slate-800">Select an application</h2>
          <p class="max-w-xs text-center mt-2 text-sm">Choose an entry from the left sidebar to view the full student
            profile and documents.</p>
        </div>

        <div id="appDetails" class="hidden max-w-4xl mx-auto p-8">
          <!-- Details injected here -->
        </div>
      </div>

    </main>
  </div>

  <script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzVz4w18ShRebQeUjKkS2xsYz8AzxoEsNG0Sb0pzWnmgadrJlA6xrySVbLY198gLOyP/exec';
    const adminPassword = localStorage.getItem('admin_password');
    let allApplications = [];

    function checkAuth() {
      if (!adminPassword) {
        window.location.href = 'login.html';
        return;
      }
      document.getElementById('bodyContent').classList.remove('hidden');
      initializeApp();
    }

    async function initializeApp() {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      const status = urlParams.get('status');

      if (status === 'Pending') document.getElementById('nav_pending').classList.add('active'), document.getElementById('nav_all').classList.remove('active');
      else if (status === 'Accepted') document.getElementById('nav_accepted').classList.add('active'), document.getElementById('nav_all').classList.remove('active');
      else if (status === 'Rejected') document.getElementById('nav_rejected').classList.add('active'), document.getElementById('nav_all').classList.remove('active');

      try {
        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=get_all&password=${adminPassword}`);
        const result = await response.json();
        if (result.success) {
          allApplications = result.data;
          loadList(id, status);
          if (id) loadDetails(id);
        } else {
          handleLogout();
        }
      } catch (err) {
        console.error(err);
        alert('Error loading applications.');
      }
    }

    function loadList(selectedId, statusFilter) {
      const listContainer = document.getElementById('appList');
      let filtered = allApplications;

      if (statusFilter) {
        filtered = allApplications.filter(a => a.status === statusFilter);
        document.getElementById('list_title').textContent = statusFilter + ' Applications';
      }

      document.getElementById('list_count').textContent = filtered.length + ' total submissions';

      if (filtered.length === 0) {
        listContainer.innerHTML = '<div class="p-8 text-center text-slate-400"><i class="fa-solid fa-folder-open text-4xl mb-3 opacity-20"></i><p class="text-sm">No applications found</p></div>';
        return;
      }

      listContainer.innerHTML = filtered.reverse().map(app => {
        const isActive = app.id == selectedId;
        return `
          <a href="view_applications.html?id=${app.id}${statusFilter ? '&status=' + statusFilter : ''}" 
             class="block p-4 border-b border-slate-50 hover:bg-indigo-50/50 transition-colors ${isActive ? 'bg-indigo-50 border-l-4 border-l-indigo-600' : ''}">
            <div class="flex justify-between items-start mb-1">
              <span class="text-xs font-bold text-indigo-600">#${String(app.id).padStart(4, '0')}</span>
              <span class="text-[10px] text-slate-400">${app.date}</span>
            </div>
            <h3 class="font-semibold text-slate-800 text-sm truncate">${app.student_name}</h3>
            <p class="text-xs text-slate-500">${app.class_applied}</p>
          </a>
        `;
      }).join('');
    }

    function loadDetails(id) {
      const detailsArea = document.getElementById('appDetails');
      const app = allApplications.find(a => a.id == id);

      if (!app) {
        detailsArea.innerHTML = '<p class="p-12 text-center text-red-500">Application not found.</p>';
        return;
      }

      const photoUrl = app.photo_url; const dob = app.dob; // In GAS, it might be a pre-formatted string or we can format it

      detailsArea.innerHTML = `
        <div class="flex justify-between items-center mb-6">
          <div class="flex gap-2 ml-auto">
             <button onclick="window.print()"
               class="inline-flex items-center px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50 transition shadow-sm">
              <i class="fa-solid fa-print mr-2 text-slate-400"></i> Print Details
            </button>
            <select id="statusSelect" class="bg-white border text-sm rounded-lg px-3 py-1.5" onchange="updateStatus(${app.id}, this.value)">
              <option value="Pending" ${app.status === 'Pending' ? 'selected' : ''}>Pending</option>
              <option value="Accepted" ${app.status === 'Accepted' ? 'selected' : ''}>Accepted</option>
              <option value="Rejected" ${app.status === 'Rejected' ? 'selected' : ''}>Rejected</option>
            </select>
          </div>
        </div>

        <div class="bg-gradient-to-r from-indigo-600 to-purple-700 rounded-2xl p-6 text-white flex flex-col sm:flex-row items-start sm:items-center gap-4">
          ${photoUrl ? `<img src="${photoUrl}" class="w-20 h-20 rounded-xl object-contain bg-white/20 border-4 border-white/30 shadow-lg flex-shrink-0" />` : `<div class="w-20 h-20 rounded-xl bg-white/20 flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-user text-white text-3xl"></i></div>`}
          <div>
            <h1 class="text-2xl font-bold">${app.student_name}</h1>
            <div class="flex flex-wrap items-center gap-x-4 gap-y-1 mt-1 opacity-90 text-sm">
              <span><i class="fa-solid fa-envelope mr-1.5 opacity-70"></i> ${app.email}</span>
              <span><i class="fa-solid fa-phone mr-1.5 opacity-70"></i> ${app.phone}</span>
            </div>
          </div>
          <div class="sm:ml-auto bg-white/10 px-4 py-2 rounded-xl backdrop-blur-md border border-white/10 text-center min-w-[100px]">
            <p class="text-[10px] uppercase tracking-wider opacity-70">Status</p>
            <p class="font-bold" id="current_status">${app.status}</p>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
          <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
            <h2 class="text-sm font-bold text-slate-800 uppercase tracking-widest mb-4 flex items-center"><span class="w-2 h-2 bg-indigo-600 rounded-full mr-2"></span> Basic Details</h2>
            <div class="space-y-4">
              <div><p class="text-xs text-slate-400 mb-1">Date of Birth</p><p class="font-medium">${dob}</p></div>
              <div><p class="text-xs text-slate-400 mb-1">Gender</p><p class="font-medium">${app.gender}</p></div>
              <div><p class="text-xs text-slate-400 mb-1">Class Applied</p><p class="font-medium text-indigo-600">${app.class_applied}</p></div>
              ${app.stream ? `<div><p class="text-xs text-slate-400 mb-1">Stream</p><p class="font-medium text-purple-600">${app.stream}</p></div>` : ''}
              <div><p class="text-xs text-slate-400 mb-1">Blood Group</p><p class="font-medium">${app.blood_group || '—'}</p></div>
              <div><p class="text-xs text-slate-400 mb-1">Aadhaar</p><p class="font-medium">XXXX XXXX ${String(app.aadhaar).slice(-4)}</p></div>
            </div>
          </div>
          <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
            <h2 class="text-sm font-bold text-slate-800 uppercase tracking-widest mb-4 flex items-center"><span class="w-2 h-2 bg-purple-600 rounded-full mr-2"></span> Family & Address</h2>
            <div class="space-y-4">
              <div><p class="text-xs text-slate-400 mb-1">Father's Name</p><p class="font-medium">${app.father_name}</p></div>
              <div><p class="text-xs text-slate-400 mb-1">Mother's Name</p><p class="font-medium">${app.mother_name}</p></div>
              <div><p class="text-xs text-slate-400 mb-1">Full Address</p><p class="font-medium text-sm leading-relaxed">${app.address}</p></div>
              <div class="grid grid-cols-2 gap-4">
                <div><p class="text-xs text-slate-400 mb-1">City</p><p class="font-medium">${app.city}</p></div>
                <div><p class="text-xs text-slate-400 mb-1">State</p><p class="font-medium">${app.state}</p></div>
              </div>
              <div><p class="text-xs text-slate-400 mb-1">Pincode</p><p class="font-medium">${app.pincode}</p></div>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 mt-8">
          <h2 class="text-sm font-bold text-slate-800 uppercase tracking-widest mb-6 flex items-center"><span class="w-2 h-2 bg-emerald-500 rounded-full mr-2"></span> Submitted Documents</h2>
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
            ${renderDoc('photo_url', 'Student Photo', 'fa-user', app)}
            ${renderDoc('aadhaar_front_url', 'Aadhaar Front', 'fa-id-card', app)}
            ${renderDoc('aadhaar_back_url', 'Aadhaar Back', 'fa-id-card', app)}
            ${renderDoc('marksheet_url', 'Marksheet', 'fa-file-invoice', app)}
          </div>
        </div>
      `;
    }

    function renderDoc(field, label, icon, app) {
      const url = app[field];
      const isImg = field === 'photo_url' || label.toLowerCase().includes('photo') || label.toLowerCase().includes('aadhaar'); // Simple check

      let inner = '';
      if (url) {
        if (isImg) inner = `<img src="${url}" class="w-full h-24 object-contain rounded-lg bg-white shadow-sm" />`;
        else inner = `<div class="w-full h-24 flex items-center justify-center bg-white rounded-lg shadow-sm"><i class="fa-solid fa-file-pdf text-3xl text-red-500"></i></div>`;
      } else {
        inner = `<div class="w-full h-24 flex items-center justify-center bg-slate-100/50 rounded-lg border-2 border-dashed border-slate-200"><i class="fa-solid ${icon} text-2xl text-slate-300"></i></div>`;
      }

      return `
        <div class="border border-slate-100 rounded-xl p-3 flex flex-col items-center gap-2 bg-slate-50 hover:bg-white transition group relative overflow-hidden">
          ${inner}
          <span class="text-[10px] font-bold text-slate-500 text-center uppercase tracking-tighter">${label}</span>
          ${url ? `<a href="${url}" target="_blank" class="absolute inset-0 bg-indigo-600/90 text-white flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity rounded-xl"><i class="fa-solid fa-external-link mb-1"></i><span class="text-[10px] font-bold">VIEW</span></a>` : ''}
        </div>
      `;
    }

    async function deleteApplication(id) {
      if (!confirm('Are you sure you want to delete this application? This cannot be undone.')) return;

      try {
        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=delete_application&id=${id}&password=${adminPassword}`);
        const result = await response.json();
        if (result.success) {
          alert('Application deleted successfully.');
          window.location.href = 'view_applications.html';
        } else {
          alert('Error deleting application: ' + (result.message || 'Unknown error'));
        }
      } catch (err) {
        console.error(err);
        alert('Network error.');
      }
    }

    async function updateStatus(id, newStatus) {
      try {
        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=update_status&id=${id}&status=${newStatus}&password=${adminPassword}`);
        const result = await response.json();
        if (result.success) {
          document.getElementById('current_status').textContent = newStatus;
          // Update local data
          const app = allApplications.find(a => a.id == id);
          if (app) app.status = newStatus;
        } else {
          alert('Error updating status.');
        }
      } catch (err) {
        console.error(err);
        alert('Network error.');
      }
    }

    function handleLogout() {
      localStorage.removeItem('admin_password');
      window.location.href = 'login.html';
    }

    checkAuth();
  </script>
</body>

</html>
